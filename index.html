<!DOCTYPE html>
<html>
<head>
  <title>Discipline Check-in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: white;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 28px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .status {
      text-align: center;
      font-size: 14px;
      color: #2563eb;
      background: #eff6ff;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .stat-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
    }

    .info-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #374151;
    }

    .checklist {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 22px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .primary-btn {
      background: #2563eb;
      color: white;
    }

    .primary-btn:hover {
      background: #1d4ed8;
    }

    .danger-btn {
      background: #fee2e2;
      color: #991b1b;
    }

    .danger-btn:hover {
      background: #fecaca;
    }

    .secondary-btn {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    .secondary-btn:hover {
      background: #e5e7eb;
    }

    .auth-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .auth-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .auth-row button {
      margin-top: 0;
    }

    .footer-note {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #6b7280;
    }

    .history-card {
      margin-top: 18px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
    }

    .history-title {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
    }

    .history-empty {
      font-size: 14px;
      color: #6b7280;
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Daily Discipline Check-in</h1>
    <p class="subtitle">Small rules. Daily progress.</p>

    <p id="status" class="status">Loading Firebase...</p>

    <div class="auth-card">
      <p id="authInfo">Sign in status: loading...</p>
      <div class="auth-row">
        <button class="secondary-btn" onclick="connectGoogle()">Sync with Google</button>
        <button class="secondary-btn" onclick="signOutUser()">Sign out</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Current Streak</div>
        <div id="streak" class="stat-value">0 days</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Best Streak</div>
        <div id="bestStreak" class="stat-value">0 days</div>
      </div>
    </div>

    <div class="info-card">
      <p id="lastCheckIn">Last check-in: none</p>
      <p id="countdown">Time left before streak reset: loading...</p>
    </div>

    <div class="checklist">
      <label>
        <input type="checkbox" id="work">
        I worked/studied today
      </label>

      <label>
        <input type="checkbox" id="noChinese">
        I did not watch Chinese content
      </label>

      <label>
        <input type="checkbox" id="english">
        I stayed mostly in an English environment
      </label>
    </div>

    <button class="primary-btn" onclick="checkIn()">Check in today</button>

    <button class="danger-btn" onclick="resetProgress()">Reset / Fresh Start</button>

    <p class="footer-note">Deadline: 12:30 AM every day</p>

    <div class="history-card">
      <h2 class="history-title">Recent check-in history</h2>
      <div id="historyContainer">
        <p class="history-empty">Loading your records...</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged,
      GoogleAuthProvider,
      signInWithPopup,
      linkWithPopup,
      signOut,
      signInWithRedirect,
      linkWithRedirect
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      collection,
      query,
      where,
      getDocs
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA-Edt2MC8yZiHI_WRQKte5VEncEUIP1L4",
      authDomain: "daily-check-in-86968.firebaseapp.com",
      projectId: "daily-check-in-86968",
      storageBucket: "daily-check-in-86968.firebasestorage.app",
      messagingSenderId: "1063521708690",
      appId: "1:1063521708690:web:1bad506bb31982d0a2d44b",
      measurementId: "G-55SNKVD5B7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userId = null;
    let authUser = null;
    let currentStreak = 0;
    let bestStreak = 0;
    let lastCheckIn = null;

    function getLocalDateString(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return year + "-" + month + "-" + day;
    }

    function getYesterdayString() {
      const date = new Date();
      date.setDate(date.getDate() - 1);
      return getLocalDateString(date);
    }

    function getDateAtDayOffset(baseDate, offsetDays) {
      const date = new Date(baseDate);
      date.setDate(date.getDate() + offsetDays);
      return getLocalDateString(date);
    }

    function isAfterTodayDeadline() {
      const now = new Date();
      const deadline = new Date();
      deadline.setHours(0, 30, 0, 0);
      return now > deadline;
    }

    function getNextDeadline() {
      const now = new Date();
      const deadline = new Date();

      deadline.setHours(0, 30, 0, 0);

      if (now > deadline) {
        deadline.setDate(deadline.getDate() + 1);
      }

      return deadline;
    }

    function updateCountdown() {
      const now = new Date();
      const deadline = getNextDeadline();

      const diff = deadline - now;

      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("countdown").textContent =
        "Time left before streak reset: " +
        hours + "h " + minutes + "m " + seconds + "s";
    }

    function updateUI() {
      document.getElementById("streak").textContent =
        currentStreak + " days";

      document.getElementById("bestStreak").textContent =
        bestStreak + " days";

      document.getElementById("lastCheckIn").textContent =
        "Last check-in: " + (lastCheckIn || "none");
    }

    function updateAuthUI(user) {
      const authInfo = document.getElementById("authInfo");

      if (!user) {
        authInfo.textContent = "Sign in status: signed out";
        return;
      }

      if (user.isAnonymous) {
        authInfo.textContent = "Sign in status: guest mode (this device only)";
        return;
      }

      authInfo.textContent = "Sign in status: synced as " + (user.email || user.uid);
    }

    async function saveUserData() {
      await setDoc(doc(db, "users", userId), {
        currentStreak: currentStreak,
        bestStreak: bestStreak,
        lastCheckIn: lastCheckIn
      }, { merge: true });
    }

    function getAllowedPreviousCheckInDate(now = new Date()) {
      // Before 12:30 AM, yesterday still counts for streak continuation.
      if (!isAfterTodayDeadline()) {
        return getDateAtDayOffset(now, -2);
      }

      return getDateAtDayOffset(now, -1);
    }

    function getExpectedCheckInDate(now = new Date()) {
      if (!isAfterTodayDeadline()) {
        return getDateAtDayOffset(now, -1);
      }

      return getLocalDateString(now);
    }

    function isOnTimeContinuation(lastDate, now = new Date()) {
      return lastDate === getAllowedPreviousCheckInDate(now);
    }

    async function renderHistory() {
      const historyContainer = document.getElementById("historyContainer");
      try {
        const q = query(
          collection(db, "checkins"),
          where("userId", "==", userId)
        );

        const snap = await getDocs(q);

        if (snap.empty) {
          historyContainer.innerHTML = "<p class=\"history-empty\">No history yet. Start with your first check-in today.</p>";
          return;
        }

        const sortedHistory = snap.docs
          .map((docSnap) => docSnap.data())
          .sort((a, b) => b.date.localeCompare(a.date))
          .slice(0, 14);

        const items = sortedHistory.map((data) => {
          const outcome = data.success ? "Success" : "Failed";
          return (
            "<li class=\"history-item\">" +
            "<span>" + data.date + "</span>" +
            "<span>" + outcome + "</span>" +
            "</li>"
          );
        }).join("");

        historyContainer.innerHTML = "<ul class=\"history-list\">" + items + "</ul>";
      } catch (error) {
        console.error("History load failed:", error);
        historyContainer.innerHTML = "<p class=\"history-empty\">Could not load history. Check Firestore rules and refresh.</p>";
      }
    }

    async function applyMissedCheckInRule() {
      const today = getLocalDateString();
      const yesterday = getYesterdayString();

      if (lastCheckIn === today) {
        return;
      }

      if (lastCheckIn === yesterday && !isAfterTodayDeadline()) {
        return;
      }

      if (currentStreak !== 0) {
        currentStreak = 0;
        await saveUserData();
      }
    }

    async function loadUserData() {
      const userRef = doc(db, "users", userId);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        const data = userSnap.data();

        currentStreak = data.currentStreak || 0;
        bestStreak = data.bestStreak || 0;
        lastCheckIn = data.lastCheckIn || null;
      } else {
        currentStreak = 0;
        bestStreak = 0;
        lastCheckIn = null;

        await saveUserData();
      }

      await applyMissedCheckInRule();

      updateUI();
      await renderHistory();

      document.getElementById("status").textContent =
        "Cloud data connected.";
    }

    async function connectGoogle() {
      try {
        const provider = new GoogleAuthProvider();

        if (!auth.currentUser) {
          await signInWithPopup(auth, provider);
          return;
        }

        if (auth.currentUser.isAnonymous) {
          await linkWithPopup(auth.currentUser, provider);
          alert("Synced! Your current data is now linked to Google.");
          return;
        }

        alert("This account is already synced.");
      } catch (error) {
        console.error("Google sync failed:", error);
        const popupFallbackCodes = [
          "auth/popup-blocked",
          "auth/popup-closed-by-user",
          "auth/cancelled-popup-request",
          "auth/operation-not-supported-in-this-environment"
        ];

        if (popupFallbackCodes.includes(error.code)) {
          try {
            const provider = new GoogleAuthProvider();

            if (auth.currentUser && auth.currentUser.isAnonymous) {
              await linkWithRedirect(auth.currentUser, provider);
            } else {
              await signInWithRedirect(auth, provider);
            }
            return;
          } catch (redirectError) {
            console.error("Google redirect sync failed:", redirectError);
          }
        }

        alert("Google sign-in failed. Please check Firebase Google Auth setup and try again.");
      }
    }

    async function signOutUser() {
      try {
        await signOut(auth);
        await signInAnonymously(auth);
        alert("Signed out. Switched to guest mode on this device.");
      } catch (error) {
        console.error("Sign out failed:", error);
        alert("Could not sign out. Try refreshing the page.");
      }
    }

    async function checkIn() {
      const work = document.getElementById("work").checked;
      const noChinese = document.getElementById("noChinese").checked;
      const english = document.getElementById("english").checked;

      if (!work || !noChinese || !english) {
        alert("You need to complete all rules before checking in.");
        return;
      }

      if (!userId) {
        alert("Firebase is still loading. Try again in a few seconds.");
        return;
      }

      const now = new Date();
      const checkInDate = getExpectedCheckInDate(now);

      if (lastCheckIn === checkInDate) {
        alert("You already checked in today.");
        return;
      }

      if (!isOnTimeContinuation(lastCheckIn, now)) {
        currentStreak = 0;
      }

      if (isOnTimeContinuation(lastCheckIn, now)) {
        currentStreak++;
      } else {
        currentStreak = 1;
      }

      if (currentStreak > bestStreak) {
        bestStreak = currentStreak;
      }

      lastCheckIn = checkInDate;

      await saveUserData();

      await setDoc(doc(db, "checkins", userId + "_" + checkInDate), {
        userId: userId,
        date: checkInDate,
        work: work,
        noChinese: noChinese,
        english: english,
        success: true,
        createdAt: new Date().toISOString()
      });

      updateUI();
      await renderHistory();

      alert("Checked in successfully!");
    }

    async function resetProgress() {
      if (!userId) {
        alert("Firebase is still loading. Try again in a few seconds.");
        return;
      }

      const confirmReset = confirm(
        "Are you sure you want to reset your current progress? This will not delete old database records."
      );

      if (!confirmReset) {
        return;
      }

      currentStreak = 0;
      lastCheckIn = null;

      await saveUserData();

      await setDoc(doc(db, "resets", userId + "_" + new Date().toISOString()), {
        userId: userId,
        resetAt: new Date().toISOString(),
        note: "User started fresh. Old check-in records were not deleted."
      });

      updateUI();
      await renderHistory();

      alert("Progress reset. You can start fresh now.");
    }

    window.checkIn = checkIn;
    window.resetProgress = resetProgress;
    window.connectGoogle = connectGoogle;
    window.signOutUser = signOutUser;

    updateCountdown();
    setInterval(updateCountdown, 1000);

    signInAnonymously(auth)
      .catch((error) => {
        console.error(error);
        document.getElementById("status").textContent =
          "Firebase sign-in failed. Check Anonymous Auth.";
      });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        authUser = user;
        userId = user.uid;
        updateAuthUI(user);
        await loadUserData();
      } else {
        authUser = null;
        userId = null;
        updateAuthUI(null);
      }
    });
  </script>
</body>
</html>
